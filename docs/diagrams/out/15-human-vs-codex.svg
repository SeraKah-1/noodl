d</text><text x="436" y="254" font-family="Inter,Segoe UI,system-ui,sans-serif" font-size="12" fill="#334155">flow, provider routing</text><rect x="0" y="270" width="420" height="60" fill="#f8fafc" stroke="#e2e8f0"/><text x="16" y="296" font-family="Inter,Segoe UI,system-ui,sans-serif" font-size="12" fill="#334155">Camera privacy boundary</text><rect x="420" y="270" width="420" height="60" fill="#f8fafc" stroke="#e2e8f0"/><text x="436" y="296" font-family="Inter,Segoe UI,system-ui,sans-serif" font-size="12" fill="#334155">Hardened Supabase schema, RLS, grants, and public</text><text x="436" y="314" font-family="Inter,Segoe UI,system-ui,sans-serif" font-size="12" fill="#334155">metadata</text><rect x="0" y="330" width="420" height="42" fill="#ffffff" stroke="#e2e8f0"/><text x="16" y="356" font-family="Inter,Segoe UI,system-ui,sans-serif" font-size="12" fill="#334155">Public learning-commons model</text><rect x="420" y="330" width="420" height="42" fill="#ffffff" stroke="#e2e8f0"/><text x="436" y="356" font-family="Inter,Segoe UI,system-ui,sans-serif" font-size="12" fill="#334155">Removed unsafe credential/runtime paths and dead code</text><rect x="0" y="372" width="420" height="60" fill="#f8fafc" stroke="#e2e8f0"/><text x="16" y="398" font-family="Inter,Segoe UI,system-ui,sans-serif" font-size="12" fill="#334155">Product scope and honest claims</text><rect x="420" y="372" width="420" height="60" fill="#f8fafc" stroke="#e2e8f0"/><text x="436" y="398" font-family="Inter,Segoe UI,system-ui,sans-serif" font-size="12" fill="#334155">Added tests, CI, build gates, accessible dialogs,</text><text x="436" y="416" font-family="Inter,Segoe UI,system-ui,sans-serif" font-size="12" fill="#334155">responsive fixes</text></svg>