
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Viewport adjustment for Mobile Safari & Chrome Android (Prevent auto-zoom on inputs) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Noodl — turn notes into high-yield quizzes and remember them (SRS + Bloom + optional hands-free)" />
    
    <!-- Aesthetic Google Fonts: Outfit & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">



    <title>Noodl — use your noodle</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'Plus Jakarta Sans', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            },
            colors: {
              theme: {
                bg: 'var(--app-bg)',
                glass: 'var(--glass-bg)',
                border: 'var(--glass-border)',
                text: 'var(--text-main)',
                muted: 'var(--text-muted)',
                primary: 'var(--primary)',
              }
            },
            animation: {
              'breathe': 'breathe 4s ease-in-out infinite',
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              breathe: {
                '0%, 100%': { transform: 'scale(1)' },
                '50%': { transform: 'scale(1.03)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- PDF.js Main Library (Must match the worker version in groqService.ts) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <style>
      :root {
        /* Frosted Paper Theme (Lighter, cleaner, more texture) */
        --app-bg: #f8fafc;
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(255, 255, 255, 0.8);
        --text-main: #1e293b;
        --text-muted: #64748b;
        --primary: #4f46e5;
        
        /* Subtle colored mesh spots */
        --mesh-c1: hsla(250, 95%, 90%, 0.6);
        --mesh-c2: hsla(330, 95%, 90%, 0.6);
        --mesh-c3: hsla(190, 95%, 90%, 0.6);
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--app-bg);
        color: var(--text-main);
        overflow-x: hidden;
        transition: background-color 0.5s ease, color 0.5s ease;
        overscroll-behavior-y: none;
      }

      /* NOISE TEXTURE OVERLAY */
      .noise-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -1;
        opacity: 0.04;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='1'/%3E%3C/svg%3E");
      }

      .mesh-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100dvh;
        z-index: -2;
        background-color: var(--app-bg);
        background-image: 
          radial-gradient(at 10% 10%, var(--mesh-c1) 0px, transparent 50%), 
          radial-gradient(at 90% 10%, var(--mesh-c2) 0px, transparent 50%), 
          radial-gradient(at 50% 90%, var(--mesh-c3) 0px, transparent 50%);
        transition: background-image 0.5s ease;
      }

      /* TACTILE BUTTON UTILITY */
      .btn-tactile {
        position: relative;
        border-bottom-width: 4px;
        transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        transform: translateY(0);
      }
      
      .btn-tactile:active:not(:disabled) {
        border-bottom-width: 0px;
        transform: translateY(4px);
        margin-bottom: 4px; /* Maintain layout flow */
      }

      /* Smooth Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.1);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.2);
      }
    </style>

}
</script>
